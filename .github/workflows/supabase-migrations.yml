name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Migrations & Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Repair orphaned remote migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          OUTPUT=$(supabase db push --dry-run 2>&1) || true

          ORPHANS=$(echo "$OUTPUT" \
            | grep -oP 'supabase migration repair --status reverted \K[0-9]+' || true)

          if [ -n "$ORPHANS" ]; then
            echo "Found orphaned remote migrations — repairing:"
            for VERSION in $ORPHANS; do
              echo "  Reverting $VERSION"
              supabase migration repair --status reverted "$VERSION"
            done
          else
            echo "No orphaned migrations detected."
          fi

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          FUNCTIONS_DIR="supabase/functions"
          DEPLOYED=""
          FAILED=""

          for DIR in "$FUNCTIONS_DIR"/*/; do
            FUNC_NAME=$(basename "$DIR")
            # Skip directories without an index.ts (e.g. _shared helpers)
            if [ ! -f "$DIR/index.ts" ]; then
              echo "Skipping $FUNC_NAME (no index.ts)"
              continue
            fi
            echo "Deploying $FUNC_NAME..."
            # Phase 1 fix (Audit C5): Removed --no-verify-jwt to enforce JWT verification
            if supabase functions deploy "$FUNC_NAME"; then
              DEPLOYED="$DEPLOYED $FUNC_NAME"
            else
              echo "::warning::Failed to deploy $FUNC_NAME"
              FAILED="$FAILED $FUNC_NAME"
            fi
          done

          echo ""
          echo "--- Deploy Summary ---"
          echo "Deployed:$DEPLOYED"
          if [ -n "$FAILED" ]; then
            echo "Failed:$FAILED"
            echo "::error::Edge function deploy failures:$FAILED"
            exit 1
          fi
          echo "All functions deployed successfully."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
